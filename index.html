const LABELS = { all: '完整活動資訊', linkedin: 'LinkedIn 貼文', facebook: 'Facebook 貼文', en: 'English Version' };

let currentTab = 'all';

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('card-label').textContent = LABELS[tab];
  const el = document.getElementById('doc-content');
  el.classList.remove('loading');
  el.textContent = CONTENT[tab];
}

async function fetchDoc() {
  const el = document.getElementById('doc-content');
  const ts = document.getElementById('updated-ts');
  el.classList.add('loading');
  el.textContent = '正在從 Google Doc 同步最新內容...';
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    if (data.content) CONTENT.all = data.content;
    el.classList.remove('loading');
    el.textContent = CONTENT[currentTab];
    const t = new Date(data.updated);
    ts.textContent = '最後同步：' + t.toLocaleString('zh-TW');
  } catch(e) {
    el.classList.remove('loading');
    el.textContent = CONTENT[currentTab];
    ts.textContent = '使用本地快取版本';
  }
}

function copyContent() {
  const text = document.getElementById('doc-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  });
}

fetchDoc();
