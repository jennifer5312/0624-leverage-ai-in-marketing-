let currentTab = 'all';
let docRawContent = '';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['all','linkedin','facebook','en'][i] === tab);
  });
  const el = document.getElementById('doc-content');
  if (docRawContent) {
    el.classList.remove('loading');
    el.textContent = LOCAL_CONTENT[tab] || docRawContent;
  }
}

async function fetchDoc() {
  const el = document.getElementById('doc-content');
  const ts = document.getElementById('updated-ts');
  el.classList.add('loading');
  el.textContent = '正在從 Google Doc 同步最新內容...';
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    docRawContent = data.content || '';
    el.classList.remove('loading');
    el.textContent = LOCAL_CONTENT[currentTab] || docRawContent;
    const t = new Date(data.updated);
    ts.textContent = '最後同步：' + t.toLocaleString('zh-TW');
  } catch(e) {
    el.classList.remove('loading');
    el.textContent = LOCAL_CONTENT[currentTab];
    ts.textContent = '（使用本地快取版本）';
  }
}

function copyContent() {
  const text = document.getElementById('doc-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="copyContent()"]');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i>已複製';
    setTimeout(() => btn.innerHTML = orig, 2000);
  });
}

fetchDoc();
